services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: news-aggregator-DB
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - news-aggregator-network
    ports:
      - "5432:5432"

networks:
  news-aggregator-network:
    driver: bridge

volumes:
  postgres-data: